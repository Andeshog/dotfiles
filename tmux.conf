set -g mouse on
set -g set-clipboard on

bind s setw synchronize-panes

set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB,tmux-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g window-style 'bg=colour235'
set -g window-active-style 'bg=colour236'
set -g focus-events on

# Use vim keys for pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin "nordtheme/tmux"
set -g @plugin "janoamaral/tokyo-night-tmux"

set -g @tokyo-night-tmux_theme storm
set -g @tokyo-night-tmux_show_git 0
set -g @tokyo-night-tmux_show_wbg 0
set -g @tokyo-night-tmux_show_datetime 1

# Icon styles
set -g @tokyo-night-tmux_window_id_style hsquare
set -g @tokyo-night-tmux_pane_id_style dsquare
set -g @tokyo-night-tmux_zoom_id_style dsquare
set -g @tokyo-night-tmux_terminal_icon 
set -g @tokyo-night-tmux_active_terminal_icon 

# No extra spaces between icons
set -g @tokyo-night-tmux_window_tidy_icons 0
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_hostname 0
set -g @tokyo-night-tmux_show_path 0

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
